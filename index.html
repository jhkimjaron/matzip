<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>맛집지도 — 네이버 리뷰 기반</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=zvmm7wkis7"></script>

<script src="./data/places.js" onerror="console.warn('places.js 없음')"></script>

<style>
  /* ── 다크 모드 (기본) ── */
  :root {
    --bg:       #0f0f0f;
    --surface:  #1a1a1a;
    --surface2: #242424;
    --border:   #2e2e2e;
    --text:     #e8e6e0;
    --muted:    #888;
    --dim:      #555;
    --accent:   #03c75a;
    --accent-d: #029a44;
    --sidebar-w: 360px;
    --font:     'Noto Sans KR', sans-serif;
    --mono:     'DM Mono', monospace;
    --tile-filter: brightness(0.7) saturate(0.6);
    --shadow:   rgba(0,0,0,.5);
    --pin-shadow: rgba(0,0,0,.6);
  }

  /* ── 라이트 모드 (시스템 설정 따름) ── */
  @media (prefers-color-scheme: light) {
    :root {
      --bg:       #f4f4f4;
      --surface:  #ffffff;
      --surface2: #f0f0f0;
      --border:   #e0e0e0;
      --text:     #1a1a1a;
      --muted:    #666;
      --dim:      #999;
      --accent:   #03c75a;
      --accent-d: #029a44;
      --tile-filter: brightness(1) saturate(0.9);
      --shadow:   rgba(0,0,0,.12);
      --pin-shadow: rgba(0,0,0,.3);
    }
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── 헤더 ── */
  header {
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 16px;
    z-index: 1000;
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    white-space: nowrap;
  }

  .search-wrap { flex:1; max-width:380px; position:relative; }
  .search-wrap input {
    width:100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px 7px 32px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--accent-d); }
  .search-wrap input::placeholder { color: var(--dim); }
  .search-icon {
    position:absolute; left:10px; top:50%;
    transform:translateY(-50%);
    color:var(--dim); font-size:14px; pointer-events:none;
  }

  /* ── 음식 분류 드롭다운 (다중선택) ── */
  .cat-filter { position:relative; flex-shrink:0; }
  .cat-filter-btn {
    display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
    padding:7px 12px; border-radius:8px;
    border:1px solid var(--border); background:var(--surface2);
    color:var(--muted); font-family:var(--font); font-size:13px;
    cursor:pointer; transition:border-color .15s, color .15s;
  }
  .cat-filter-btn:hover { border-color:var(--accent-d); color:var(--text); }
  .cat-filter-btn.active { border-color:var(--accent); color:var(--text); }
  .cat-filter-caret { font-size:10px; color:var(--dim); }
  .cat-filter-count {
    display:none; min-width:16px; text-align:center;
    background:var(--accent); color:#fff; font-size:11px; font-weight:600;
    padding:0 5px; border-radius:9px; line-height:16px;
  }
  .cat-filter-count.show { display:inline-block; }

  .cat-filter-panel {
    position:absolute; top:calc(100% + 8px); right:0;
    width:260px; max-height:min(60vh, 420px); overflow-y:auto;
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:8px; z-index:1200;
    box-shadow:0 8px 28px rgba(0,0,0,.45);
  }
  .cat-panel-head {
    display:flex; justify-content:space-between; align-items:center;
    padding:4px 6px 8px; border-bottom:1px solid var(--border); margin-bottom:6px;
  }
  .cat-panel-head span { font-size:12px; color:var(--muted); }
  .cat-panel-clear {
    background:none; border:none; color:var(--accent);
    font-size:12px; cursor:pointer; font-family:var(--font); padding:2px 4px;
  }
  .cat-panel-clear:hover { text-decoration:underline; }
  .cat-opt {
    display:flex; align-items:center; gap:9px;
    padding:7px 8px; border-radius:6px; cursor:pointer;
    font-size:13px; color:var(--text); user-select:none;
  }
  .cat-opt:hover { background:var(--surface2); }
  .cat-opt input { accent-color:var(--accent); width:15px; height:15px; cursor:pointer; }
  .cat-opt .cat-opt-cnt { margin-left:auto; font-size:11px; color:var(--dim); font-family:var(--mono); }

  /* ── 레이아웃 ── */
  .main { display:flex; flex:1; overflow:hidden; }

  /* ── 사이드바 ── */
  .sidebar {
    width: var(--sidebar-w); flex-shrink:0;
    background: var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column; overflow:hidden;
  }

  .sidebar-header {
    padding:10px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .count-label { font-size:12px; color:var(--muted); }
  .count-label span { color:var(--accent); font-family:var(--mono); font-weight:500; }

  .sort-select {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:6px; color:var(--muted); font-family:var(--font);
    font-size:12px; padding:4px 8px; outline:none; cursor:pointer;
  }

  .place-list {
    overflow-y:auto; flex:1;
    scrollbar-width:thin; scrollbar-color:var(--border) transparent;
  }

  /* ── 카드 ── */
  .place-card {
    padding:13px 16px; border-bottom:1px solid var(--border);
    cursor:pointer; transition:background .12s;
  }
  .place-card:hover { background:var(--surface2); }
  .place-card.active { background:var(--surface2); border-left:3px solid var(--accent); padding-left:13px; }

  .card-top {
    display:flex; align-items:flex-start;
    justify-content:space-between; gap:8px; margin-bottom:5px;
  }
  .card-name { font-size:14px; font-weight:500; color:var(--text); line-height:1.3; }

  .matzip-badge {
    font-size:11px; font-weight:600; padding:2px 8px;
    border-radius:10px; white-space:nowrap; flex-shrink:0;
    background:rgba(3,199,90,.15); color:var(--accent);
    border:1px solid rgba(3,199,90,.3);
  }

  /* 공식 수상 배지 (미쉐린·빕구르망·블루리본) */
  .award-badge {
    display:inline-flex; align-items:center; gap:3px;
    font-size:10px; font-weight:600; padding:2px 7px;
    border-radius:10px; white-space:nowrap; flex-shrink:0;
    background:rgba(214,158,46,.14); color:#e0b341;
    border:1px solid rgba(214,158,46,.4);
  }
  .award-badge + .award-badge { margin-left:4px; }
  .award-badge.aw-blue { background:rgba(80,140,255,.14); color:#7aa6ff; border-color:rgba(80,140,255,.4); }

  .card-meta { font-size:12px; color:var(--muted); margin-bottom:8px; }

  /* 리뷰 분석 태그 */
  .tag-group { display:flex; flex-wrap:wrap; gap:5px; margin-top:5px; }
  .tag {
    font-size:11px; padding:3px 9px; border-radius:12px;
    background:var(--surface2); border:1px solid var(--border);
    color:var(--muted); white-space:nowrap;
  }
  .tag-menu  { border-color:rgba(3,199,90,.35); color:var(--accent); background:rgba(3,199,90,.08); }
  .tag-neg   { border-color:rgba(240,96,96,.35); color:#f06060; background:rgba(240,96,96,.08); }
  .tag-kw    { border-color:rgba(96,160,240,.35); color:#60a0f0; background:rgba(96,160,240,.08); }

  .analysis-label {
    font-size:11px; color:var(--dim); margin-bottom:3px; margin-top:10px;
    font-family:var(--mono); letter-spacing:.05em; text-transform:uppercase;
  }
  .analysis-label:first-child { margin-top:0; }

  .score-inline {
    display:flex; align-items:center; gap:8px; margin-top:5px;
  }
  .score-inline .bar {
    flex:1; height:5px; background:var(--border); border-radius:3px; overflow:hidden;
  }
  .score-inline .bar-fill { height:100%; border-radius:3px; }
  .score-val { font-size:12px; font-family:var(--mono); font-weight:600; min-width:32px; text-align:right; }

  .review-row {
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  .review-num {
    font-family:var(--mono); font-size:13px;
    color:var(--accent); font-weight:600;
  }
  .review-label { font-size:11px; color:var(--dim); }

  .review-bar-wrap {
    flex:1; min-width:60px; max-width:100px;
    height:3px; background:var(--border);
    border-radius:2px; overflow:hidden;
  }
  .review-bar-fill {
    height:100%; background:var(--accent); border-radius:2px;
    transition:width .4s ease;
  }

  /* ── 지도 ── */
  #map { flex:1; }
  #map-fallback {
    flex:1; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:12px; color:var(--muted); font-size:13px;
    text-align:center; line-height:1.8;
  }
  #map-fallback code { font-size:12px; color:var(--text); background:var(--surface2); padding:4px 8px; border-radius:4px; }

  /* ── 상세 패널 ── */
  .detail-panel {
    position:absolute; right:0; top:52px;
    width:480px; height:calc(100vh - 52px);
    background:var(--surface); border-left:1px solid var(--border);
    z-index:500; display:flex; flex-direction:column;
    transform:translateX(100%); transition:transform .25s cubic-bezier(.4,0,.2,1);
    overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent;
  }
  .detail-panel.open { transform:translateX(0); }

  .detail-header {
    position:sticky; top:0; background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:10px 16px; display:flex;
    align-items:center; justify-content:space-between; z-index:10;
  }
  .detail-header-title { font-size:12px; color:var(--dim); }
  .close-btn {
    background:none; border:none; color:var(--muted);
    cursor:pointer; font-size:18px; line-height:1; padding:2px;
  }
  .close-btn:hover { color:var(--text); }

  .detail-body { padding:20px; }
  .detail-name {
    font-size:24px; font-weight:700; color:var(--text);
    line-height:1.25; margin-bottom:6px; letter-spacing:-0.3px;
  }
  .detail-meta { font-size:13px; color:var(--muted); margin-bottom:18px; }

  .section { margin-bottom:20px; }
  .section-title {
    font-size:11px; font-family:var(--mono); color:var(--dim);
    letter-spacing:.08em; text-transform:uppercase; margin-bottom:10px;
  }

  .stat-block {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:12px 14px;
  }
  .stat-row {
    display:flex; justify-content:space-between;
    font-size:12px; color:var(--muted); padding:3px 0;
  }
  .stat-row span:last-child { color:var(--text); font-family:var(--mono); font-size:11px; }

  /* 라이트 모드 보정 */
  @media (prefers-color-scheme: light) {
    .stat-block { background:var(--surface2); border-color:var(--border); }
  }

  .stat-bar { height:4px; background:var(--border); border-radius:2px; margin-top:10px; overflow:hidden; }
  .stat-bar-fill { height:100%; background:var(--accent); border-radius:2px; }

  .notice-box {
    background:rgba(3,199,90,.06); border:1px solid rgba(3,199,90,.15);
    border-radius:8px; padding:10px 12px;
    font-size:11px; color:var(--muted); line-height:1.7;
  }
  .notice-box strong { color:var(--accent); }

  /* 시간 뱃지 */
  .hours-row {
    display:flex; align-items:center; gap:8px;
    font-size:12px; color:var(--muted); padding:3px 0;
  }
  .hours-label { color:var(--dim); min-width:72px; }
  .hours-val { color:var(--text); }
  .status-badge {
    font-size:10px; padding:1px 7px; border-radius:8px;
    font-weight:500;
  }
  .status-open  { background:rgba(3,199,90,.15);  color:var(--accent); }
  .status-close { background:rgba(240,96,96,.12);  color:#f06060; }
  .status-break { background:rgba(240,200,96,.12); color:#f0c860; }

  /* 리뷰 블록 구분 */
  .review-type-badge {
    display:inline-block; font-size:10px; font-weight:600;
    padding:2px 7px; border-radius:6px; margin-bottom:8px;
  }
  .badge-visitor { background:rgba(3,199,90,.15);  color:var(--accent); }
  .badge-blog    { background:rgba(96,160,240,.15); color:#60a0f0; }

  /* 키워드 리뷰 인용 */
  .kw-category { margin-bottom:14px; }
  .kw-category:last-child { margin-bottom:0; }
  .kw-label {
    font-size:11px; font-family:var(--mono); color:var(--dim);
    letter-spacing:.06em; text-transform:uppercase;
    margin-bottom:6px; display:flex; align-items:center; gap:6px;
  }
  .kw-label-count {
    font-size:10px; background:var(--surface2);
    border:1px solid var(--border); border-radius:8px;
    padding:1px 7px; color:var(--muted); font-family:var(--mono);
    text-transform:none; letter-spacing:0;
  }
  .kw-quote {
    font-size:12px; color:var(--text); line-height:1.65;
    padding:7px 10px 5px 12px;
    border-left:2px solid var(--border);
    margin-bottom:5px;
    background:var(--surface2);
    border-radius:0 6px 6px 0;
  }
  .kw-quote:last-child { margin-bottom:0; }
  .kw-quote-source {
    display:inline; font-size:10px; color:var(--dim);
    margin-left:6px; font-family:var(--mono);
  }
  .kw-no-match {
    font-size:11px; color:var(--dim); padding:4px 0 4px 4px;
    font-style:italic;
  }

  /* 네이버 지도 다크모드 */
  @media (prefers-color-scheme: dark) {
    #map { filter: brightness(0.78) saturate(0.6); }
    .map-pin-wrap { filter: brightness(1.28) saturate(1.8) !important; }
  }

  /* 커스텀 마커 */
  .map-pin-wrap {
    display:flex; flex-direction:column; align-items:center;
    cursor:pointer;
  }
  .map-pin {
    filter:drop-shadow(0 2px 4px var(--pin-shadow));
    transition:transform .15s, filter .15s;
  }
  .map-pin-wrap:hover { z-index:500; }
  .map-pin-wrap:hover .map-pin { transform:scale(1.25) translateY(-2px); }
  .map-pin-label {
    display:none;            /* 기본은 숨김 — 밀집 시 텍스트 겹침 방지 */
    background:rgba(0,0,0,.74); color:#fff;
    font-size:10px; font-family:var(--font);
    padding:2px 6px; border-radius:4px;
    white-space:nowrap; margin-top:2px;
    max-width:84px; overflow:hidden; text-overflow:ellipsis;
    pointer-events:none;
  }
  /* 줌이 높을 때만 전체 라벨 노출 */
  #map.show-labels .map-pin-label { display:block; }
  /* hover 시엔 줌과 무관하게 항상 노출 */
  .map-pin-wrap:hover .map-pin-label { display:block; }

  /* 밀집 묶음(클러스터) 버블 */
  .map-cluster {
    display:flex; align-items:center; justify-content:center;
    border-radius:50%; color:#fff; font-weight:700; font-family:var(--mono);
    background:rgba(3,199,90,.92); border:2px solid #fff;
    box-shadow:0 2px 9px rgba(0,0,0,.45); cursor:pointer;
    transition:transform .12s;
  }
  .map-cluster:hover { transform:scale(1.12); }

  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* ── 목록 토글 버튼 (모바일 전용) ── */
  .list-toggle-btn { display:none; }

  /* ── 모바일 ── */
  @media (max-width:768px) {
    /* 헤더 */
    header { gap:10px; padding:0 12px; }
    .search-wrap { flex:1; min-width:0; }
    .cat-filter-btn { padding:7px 9px; }
    .cat-filter-btn .cat-filter-caret { display:none; }
    .cat-filter-panel { width:min(72vw, 260px); }

    /* 레이아웃: 지도가 전체 채움 */
    .main { flex-direction:column; position:relative; }
    #map, #map-fallback {
      height: calc(100vh - 52px);
      width:100%; flex:none;
    }

    /* 사이드바: 하단에서 슬라이드업 */
    .sidebar {
      position:fixed;
      bottom:0; left:0; right:0;
      width:100%; height:82vh;
      flex:none;
      border-right:none;
      border-top:2px solid var(--border);
      border-radius:16px 16px 0 0;
      transform:translateY(100%);
      transition:transform .3s cubic-bezier(.4,0,.2,1);
      z-index:300;
    }
    .sidebar.open { transform:translateY(0); }

    /* 드래그 핸들 */
    .sidebar::before {
      content:'';
      display:block;
      width:40px; height:4px;
      background:var(--border);
      border-radius:2px;
      margin:10px auto 6px;
    }

    .place-list { -webkit-overflow-scrolling:touch; }

    /* 목록 토글 버튼 */
    .list-toggle-btn {
      display:flex;
      position:fixed;
      bottom:28px; left:50%;
      transform:translateX(-50%);
      background:var(--surface);
      border:1px solid var(--border);
      color:var(--text);
      font-family:var(--font);
      font-size:14px; font-weight:500;
      padding:11px 28px;
      border-radius:24px;
      cursor:pointer;
      z-index:200;
      box-shadow:0 4px 20px var(--shadow);
      gap:8px; align-items:center;
      white-space:nowrap;
      transition:background .15s, transform .15s;
    }
    .list-toggle-btn:active { transform:translateX(-50%) scale(0.96); }
    .list-toggle-btn.open {
      background:var(--accent);
      border-color:var(--accent);
      color:#fff;
      bottom: calc(82vh + 12px);
    }

    /* 사이드바 열릴 때 버튼 숨김 처리 */
    .sidebar-backdrop {
      display:none;
      position:fixed; inset:0;
      z-index:299;
      background:transparent;
    }
    .sidebar-backdrop.active { display:block; }

    /* 상세 패널: 하단 풀스크린 */
    .detail-panel {
      width:100%; height:88vh;
      top:auto; bottom:0;
      transform:translateY(100%);
      border-left:none;
      border-top:2px solid var(--border);
      border-radius:16px 16px 0 0;
      z-index:400;
    }
    .detail-panel.open { transform:translateY(0); }

    /* 카드 글씨 조정 */
    .card-name { font-size:13px; }
    .card-meta { font-size:11px; }
    .detail-body { padding:16px; }
    .detail-name { font-size:20px; }
  }

  /* 매우 작은 화면 (iPhone SE 등) */
  @media (max-width:375px) {
    #map, #map-fallback { height: calc(100vh - 52px); }
    .sidebar { height:85vh; }
    .list-toggle-btn.open { bottom: calc(85vh + 12px); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">맛집지도</div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="식당명, 카테고리, 주소 검색...">
  </div>
  <div class="cat-filter">
    <button class="cat-filter-btn" id="catFilterBtn" aria-haspopup="true" aria-expanded="false">
      🍽 음식 분류<span class="cat-filter-count" id="catFilterCount"></span>
      <span class="cat-filter-caret">▾</span>
    </button>
    <div class="cat-filter-panel" id="catFilterPanel" hidden></div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="count-label"><span id="placeCount">0</span>곳</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
        <select class="sort-select" id="regionSelect" title="지역(구) 필터">
          <option value="all">전체 지역</option>
        </select>
        <select class="sort-select" id="awardSelect" title="수상 필터" style="display:none">
          <option value="all">수상 무관</option>
        </select>
        <select class="sort-select" id="sortSelect">
          <option value="reviews">리뷰 많은순</option>
          <option value="positive">긍정률 높은순</option>
          <option value="name">이름순</option>
        </select>
      </div>
    </div>
    <div class="place-list" id="placeList"></div>
  </div>

  <div id="map" style="flex:1"></div>
</div>

<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>
<button class="list-toggle-btn" id="listToggleBtn" onclick="toggleSidebar()">☰ 목록 보기</button>

<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <span class="detail-header-title" id="detailTitle">상세 정보</span>
    <button class="close-btn" onclick="closeDetail()">&#x2715;</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<script>
let allPlaces = [], filteredPlaces = [];
let map, displayedMarkers = [];
const CLUSTER_MAX_ZOOM = 16;  // 이 줌 이상이면 클러스터 해제하고 개별 핀 표시
const CLUSTER_GRID = 62;       // 픽셀 그리드 셀 크기 (작을수록 잘 안 묶임)
let activeId = null;
let activeCategories = new Set();   // 비어있으면 = 전체 (다중선택)
let activeRegion = 'all', activeAward = 'all';

// area("서울 강남구 음식점") → 지역 라벨("서울 강남구")
function regionLabel(p) {
  return (p.area || '').replace(/\s*음식점\s*$/, '').trim();
}

// 수상 배지 HTML (네이버가 표시한 공식 수상만 데이터에 들어옴)
function awardBadge(awards) {
  if (!Array.isArray(awards) || !awards.length) return '';
  return awards.map(a => {
    const blue = a.startsWith('블루리본');
    const icon = a.startsWith('미쉐린') ? '⭐' : a.startsWith('빕') ? '🍜' : '🎀';
    return `<span class="award-badge${blue ? ' aw-blue' : ''}">${icon} ${a}</span>`;
  }).join('');
}

// ── 데이터 로드 ──
async function loadData() {
  try {
    if (window.PLACES_DATA && Array.isArray(window.PLACES_DATA)) {
      allPlaces = window.PLACES_DATA;
    } else {
      const res = await fetch('./data/places.json');
      if (!res.ok) throw new Error();
      allPlaces = await res.json();
    }
  } catch {
    document.getElementById('placeList').innerHTML =
      `<div style="padding:24px;text-align:center;color:var(--dim);font-size:13px;line-height:2">
        데이터가 없습니다.<br>
        <code style="font-size:11px;color:var(--muted)">python manage.py update --area "지역명"</code><br>
        을 먼저 실행해주세요.
       </div>`;
    return;
  }
  filteredPlaces = [...allPlaces];
  initMap();
  renderCategoryPanel();
  setupCategoryDropdown();
  renderRegionOptions();
  renderAwardOptions();
  renderList();
  renderMarkers();
}

// ── 지역(구) 셀렉트 옵션 ──
function renderRegionOptions() {
  const sel = document.getElementById('regionSelect');
  const regions = [...new Set(allPlaces.map(regionLabel).filter(Boolean))]
    .sort((a, b) => a.localeCompare(b, 'ko'));
  sel.innerHTML = '<option value="all">전체 지역</option>'
    + regions.map(r => `<option value="${r}">${r}</option>`).join('');
}

// ── 수상 셀렉트 옵션 (실제 존재하는 수상만 노출) ──
function renderAwardOptions() {
  const sel = document.getElementById('awardSelect');
  const present = new Set();
  allPlaces.forEach(p => (p.awards || []).forEach(a => {
    present.add(a.startsWith('미쉐린') ? '미쉐린' : a);  // 빕구르망·블루리본은 그대로
  }));
  if (!present.size) { sel.style.display = 'none'; return; }
  sel.style.display = '';
  const labels = [['미쉐린', '⭐ 미쉐린'], ['빕구르망', '🍜 빕구르망'], ['블루리본', '🎀 블루리본']];
  sel.innerHTML = '<option value="all">수상 무관</option>'
    + '<option value="any">⭐ 수상 업체만</option>'
    + labels.filter(([k]) => present.has(k))
            .map(([k, l]) => `<option value="${k}">${l}</option>`).join('');
}

// ── 네이버 지도 초기화 ──
function initMap() {
  const first = allPlaces[0];
  const defaultLat = (first && first.lat) ? first.lat : 37.5665;
  const defaultLng = (first && first.lng) ? first.lng : 126.9780;

  map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(defaultLat, defaultLng),
    zoom: 13,
    zoomControl: true,
    zoomControlOptions: { position: naver.maps.Position.RIGHT_BOTTOM },
    mapTypeControl: false,
    scaleControl: false,
  });

  // 줌/이동이 끝날 때마다 클러스터 재계산 (+ 라벨 표시 갱신)
  naver.maps.Event.addListener(map, 'idle', renderMarkers);
}

// ── 마커 렌더 (밀집 시 클러스터링) ──
function renderMarkers() {
  if (!map) return;

  displayedMarkers.forEach(m => m.setMap(null));
  displayedMarkers = [];

  const pts = filteredPlaces.filter(p => p.lat && p.lng);
  const proj = map.getProjection();

  // 줌이 충분히 높거나 투영 불가 → 클러스터 없이 개별 핀
  if (map.getZoom() >= CLUSTER_MAX_ZOOM || !proj) {
    pts.forEach(p => displayedMarkers.push(makePinMarker(p)));
    updateLabelVisibility();
    return;
  }

  // 픽셀 그리드로 근접 핀을 셀 단위로 묶는다
  const cells = new Map();
  pts.forEach(p => {
    const o = proj.fromCoordToOffset(new naver.maps.LatLng(p.lat, p.lng));
    const key = Math.floor(o.x / CLUSTER_GRID) + ':' + Math.floor(o.y / CLUSTER_GRID);
    (cells.get(key) || cells.set(key, []).get(key)).push(p);
  });

  cells.forEach(members => {
    displayedMarkers.push(members.length === 1
      ? makePinMarker(members[0])
      : makeClusterMarker(members));
  });
  updateLabelVisibility();
}

// 개별 음식점 핀
function makePinMarker(p) {
  const shortName = p.name.length > 8 ? p.name.slice(0, 8) + '…' : p.name;
  const m = new naver.maps.Marker({
    position: new naver.maps.LatLng(p.lat, p.lng),
    map: map,
    icon: {
      // 작은 물방울 핀 — 내부 흰점 제거, 얇은 흰 외곽선으로 겹침 시 분리감
      content: `<div class="map-pin-wrap">
        <div class="map-pin">
          <svg width="17" height="23" viewBox="0 0 17 23" fill="none">
            <path d="M8.5 0.8C4.05 0.8 0.8 4.05 0.8 8.5c0 5.9 7.7 13.4 7.7 13.4s7.7-7.5 7.7-13.4C16.2 4.05 12.95 0.8 8.5 0.8z"
                  fill="#03c75a" stroke="#ffffff" stroke-width="1.3"/>
          </svg>
        </div>
        <div class="map-pin-label">${shortName}</div>
      </div>`,
      anchor: new naver.maps.Point(8.5, 22)
    }
  });
  naver.maps.Event.addListener(m, 'click', () => openDetail(p.id));
  return m;
}

// 묶음(클러스터) 버블 — 클릭 시 해당 영역으로 줌인해 펼침
function makeClusterMarker(members) {
  const n = members.length;
  const lat = members.reduce((s, p) => s + p.lat, 0) / n;
  const lng = members.reduce((s, p) => s + p.lng, 0) / n;
  const size = n < 10 ? 34 : n < 30 ? 42 : n < 100 ? 50 : 58;
  const fs   = n < 100 ? 13 : 14;
  const m = new naver.maps.Marker({
    position: new naver.maps.LatLng(lat, lng),
    map: map,
    zIndex: 100,
    icon: {
      content: `<div class="map-cluster" style="width:${size}px;height:${size}px;font-size:${fs}px">${n}</div>`,
      anchor: new naver.maps.Point(size / 2, size / 2)
    }
  });
  naver.maps.Event.addListener(m, 'click', () => {
    let minLat = 90, maxLat = -90, minLng = 180, maxLng = -180;
    members.forEach(p => {
      minLat = Math.min(minLat, p.lat); maxLat = Math.max(maxLat, p.lat);
      minLng = Math.min(minLng, p.lng); maxLng = Math.max(maxLng, p.lng);
    });
    const span = Math.max(maxLat - minLat, maxLng - minLng);
    if (span < 1e-4) {
      // 거의 같은 좌표에 뭉친 경우 — fitBounds로는 안 펼쳐지므로 강제 줌인
      map.morph(new naver.maps.LatLng(lat, lng), Math.min(18, map.getZoom() + 3));
    } else {
      map.fitBounds(
        new naver.maps.LatLngBounds(
          new naver.maps.LatLng(minLat, minLng),
          new naver.maps.LatLng(maxLat, maxLng)),
        { top: 70, right: 70, bottom: 70, left: 70 });
    }
  });
  return m;
}

// 밀집 지역 텍스트 겹침 완화 — 줌이 충분히 높을 때만 핀 라벨을 노출.
// (낮은 줌에선 핀만, hover/선택 시엔 항상 라벨 표시 — CSS에서 처리)
function updateLabelVisibility() {
  const el = document.getElementById('map');
  if (el && map) el.classList.toggle('show-labels', map.getZoom() >= 15);
}

// ── 리스트 렌더 ──
function renderList() {
  const list = document.getElementById('placeList');
  document.getElementById('placeCount').textContent = filteredPlaces.length;

  if (!filteredPlaces.length) {
    list.innerHTML = `<div style="padding:32px;text-align:center;color:var(--dim);font-size:13px">검색 결과가 없습니다</div>`;
    return;
  }

  list.innerHTML = filteredPlaces.map(p => {
    // 실제 리뷰 수 (네이버 API 집계)
    const vTotal = p.visitor_total || 0;
    const bTotal = p.blog_total || 0;
    // 광고 제거 수 (샘플에서)
    const va = p.visitor_ad_count || 0;
    const ba = p.blog_ad_count || 0;
    const adTotal = va + ba;
    // 긍정률 bar
    const posRate = (p.positive_rate != null && p.positive_rate > 0) ? p.positive_rate : null;
    const barPct = posRate ?? 0;
    const barColor = posRate != null
      ? (posRate >= 70 ? 'var(--accent)' : posRate >= 40 ? '#f0c860' : '#f06060')
      : 'var(--border)';
    const barLabel = posRate != null ? `긍정 ${posRate}%` : (adTotal > 0 ? `광고 ${adTotal}건 제외` : '');
    const _GENERIC = new Set(['음식점','식당','레스토랑','먹거리','푸드코트']);
    const cat = (p.category || '').split(',').map(c=>c.trim()).find(c=>c&&!_GENERIC.has(c))
                || (p.category||'').split(',')[0] || '';
    const addr = (p.address || '').replace(/^충청남도|^충청북도|^경기도|^서울특별시|^서울 /, '').split(' ').slice(0, 3).join(' ');

    return `
      <div class="place-card${activeId === p.id ? ' active' : ''}" onclick="openDetail('${p.id}')" data-id="${p.id}">
        <div class="card-top">
          <div class="card-name">${p.name}</div>
          ${awardBadge(p.awards)}
        </div>
        <div class="card-meta">${cat}${addr ? ' &middot; ' + addr : ''}</div>
        <div class="review-row">
          <span class="review-num" title="방문자 전체 리뷰">${vTotal.toLocaleString()}</span>
          <span class="review-label" style="color:var(--accent)">방문자</span>
          <span class="review-num" style="color:#60a0f0" title="블로그 전체 리뷰">${bTotal.toLocaleString()}</span>
          <span class="review-label" style="color:#60a0f0">블로그</span>
          <div class="review-bar-wrap"><div class="review-bar-fill" style="width:${barPct}%;background:${barColor}"></div></div>
          <span class="review-label">${barLabel}</span>
        </div>
      </div>`;
  }).join('');
}

// ── 음식 분류 드롭다운 (다중선택 체크박스) ──
function renderCategoryPanel() {
  const cats = new Map(); // category → count
  allPlaces.forEach(p => {
    const c = (p.category || '').trim();
    if (c && c !== '기타') cats.set(c, (cats.get(c) || 0) + 1);
  });

  const panel = document.getElementById('catFilterPanel');
  const sorted = [...cats.entries()].sort((a, b) => b[1] - a[1]);  // 많은 순
  panel.innerHTML = `
    <div class="cat-panel-head">
      <span>음식 분류 (다중선택)</span>
      <button class="cat-panel-clear" id="catClear">초기화</button>
    </div>
    ${sorted.map(([cat, n]) => `
      <label class="cat-opt">
        <input type="checkbox" value="${cat}"${activeCategories.has(cat) ? ' checked' : ''}>
        <span>${cat}</span><span class="cat-opt-cnt">${n}</span>
      </label>`).join('')}`;

  panel.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      if (cb.checked) activeCategories.add(cb.value);
      else activeCategories.delete(cb.value);
      updateCatButton();
      applyFilters();
    });
  });
  document.getElementById('catClear').addEventListener('click', () => {
    activeCategories.clear();
    panel.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
    updateCatButton();
    applyFilters();
  });
  updateCatButton();
}

// 선택 개수 배지 + 버튼 활성 상태 갱신
function updateCatButton() {
  const badge = document.getElementById('catFilterCount');
  const btn = document.getElementById('catFilterBtn');
  const n = activeCategories.size;
  badge.textContent = n;
  badge.classList.toggle('show', n > 0);
  btn.classList.toggle('active', n > 0);
}

// 드롭다운 열고/닫기 + 바깥 클릭 시 닫기
function setupCategoryDropdown() {
  const btn = document.getElementById('catFilterBtn');
  const panel = document.getElementById('catFilterPanel');
  btn.addEventListener('click', e => {
    e.stopPropagation();
    const open = panel.hidden;
    panel.hidden = !open;
    btn.setAttribute('aria-expanded', String(open));
  });
  document.addEventListener('click', e => {
    if (!panel.hidden && !panel.contains(e.target) && e.target !== btn) {
      panel.hidden = true;
      btn.setAttribute('aria-expanded', 'false');
    }
  });
}

// ── 리뷰 분석 블록 (서버가 만든 review_analysis를 렌더링만 한다) ──
function buildAnalysisBlock(p) {
  const ra      = p.review_analysis || {};
  const menus   = ra.menus || [];
  const apps    = ra.reservation_apps || [];
  const aspects = ra.aspects || [];
  const sourceLabel = { visitor: '방문자', blog: '블로그' };

  // 인용문에서 매칭된 키워드만 하이라이트
  function highlight(text, kw) {
    if (!kw) return text;
    const re = new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(re, '<mark style="background:rgba(3,199,90,.25);color:inherit;border-radius:2px;padding:0 1px">$1</mark>');
  }

  const menuSection = menus.length ? `
    <div class="section">
      <div class="section-title">대표 메뉴</div>
      <div class="tag-group">
        ${menus.map(m => `<span class="tag tag-menu">🍽 ${m}</span>`).join('')}
      </div>
    </div>` : '';

  const reservationSection = `
    <div class="section">
      <div class="section-title">온라인 예약</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;">
        ${apps.length
          ? apps.map(app => `
              <span style="font-size:11px;padding:3px 10px;border-radius:10px;
                background:rgba(3,199,90,.12);border:1px solid rgba(3,199,90,.3);
                color:var(--accent);font-weight:500">${app} 가능</span>`).join('')
          : `<span style="font-size:11px;padding:3px 10px;border-radius:10px;
              background:var(--surface2);border:1px solid var(--border);
              color:var(--dim)">리뷰에서 확인 불가</span>`
        }
      </div>
    </div>`;

  const analysisSection = aspects.length ? `
    <div class="section">
      <div class="section-title">리뷰 분석 <span style="color:var(--dim);font-size:10px;font-family:var(--font);text-transform:none;letter-spacing:0">키워드 기반 · ${ra.analyzed || 0}건</span></div>
      <div class="stat-block">
        ${aspects.map(a => `
          <div class="kw-category">
            <div class="kw-label">
              ${a.icon} ${a.label}
              <span class="kw-label-count">${a.count}건</span>
            </div>
            ${(a.quotes || []).map(q => `
              <div class="kw-quote">
                ${highlight(q.text, q.kw)}<span class="kw-quote-source">· ${sourceLabel[q.type] || '방문자'} 리뷰</span>
              </div>`).join('')}
          </div>`).join('')}
      </div>
    </div>` : `
    <div class="section">
      <div class="section-title">리뷰 분석</div>
      <div class="stat-block" style="color:var(--dim);font-size:12px;text-align:center;padding:16px">
        리뷰 데이터가 없습니다
      </div>
    </div>`;

  return menuSection + reservationSection + analysisSection;
}

// ── 상세 패널 ──
function openDetail(id) {
  const p = allPlaces.find(x => x.id === id);
  if (!p) return;

  activeId = id;
  document.querySelectorAll('.place-card').forEach(c =>
    c.classList.toggle('active', c.dataset.id === id));

  if (map && p.lat && p.lng) {
    map.setCenter(new naver.maps.LatLng(p.lat, p.lng));
    map.setZoom(16);
  }

  document.getElementById('detailTitle').textContent = '상세 정보';

  // ── 영업정보 ──
  const statusCls = (() => {
    const s = (p.business_status || '').toLowerCase();
    if (s.includes('영업중') || s.includes('영업 중')) return 'status-open';
    if (s.includes('브레이크') || s.includes('break')) return 'status-break';
    return 'status-close';
  })();
  const hoursBlock = (p.business_hours || p.break_time || p.closed_days || p.business_status) ? `
    <div class="section">
      <div class="section-title">영업 정보</div>
      <div class="stat-block">
        ${p.business_status ? `<div class="hours-row"><span class="status-badge ${statusCls}">${p.business_status}</span></div>` : ''}
        ${p.business_hours  ? `<div class="hours-row"><span class="hours-label">영업시간</span><span class="hours-val">${p.business_hours}</span></div>` : ''}
        ${p.break_time      ? `<div class="hours-row"><span class="hours-label">브레이크</span><span class="hours-val">${p.break_time}</span></div>` : ''}
        ${p.closed_days     ? `<div class="hours-row"><span class="hours-label">휴무일</span><span class="hours-val">${p.closed_days}</span></div>` : ''}
      </div>
    </div>` : '';

  // ── 방문자 리뷰 블록 ──
  const vt = p.visitor_total || 0;   // 네이버 집계 전체
  const vs = p.visitor_sampled || 0; // 실제 크롤링해서 분석한 수 (최신순 최대 100건)
  const vv = p.visitor_valid || p.filtered_reviews || 0;
  const va = p.visitor_ad_count || 0;
  const vd = p.visitor_dup_count || 0;

  // 리뷰 부족 표시 (서버 분석이 신뢰 기준 미만으로 판정)
  const _short = p.review_analysis?.shortage || {};
  const lowNote = '<span style="font-size:10px;color:#f0c860;margin-left:6px;font-weight:500">⚠ 리뷰 부족</span>';

  // 긍정률 색상 헬퍼
  function rateColor(r) {
    return r >= 70 ? 'var(--accent)' : r >= 40 ? '#f0c860' : '#f06060';
  }

  const visitorBlock = `
    <div class="stat-block" style="margin-bottom:8px">
      <div class="review-type-badge badge-visitor">방문자 리뷰</div>
      <div class="stat-row">
        <span>전체 리뷰 수 (네이버 집계)</span>
        <span style="color:var(--text);font-weight:500">${vt.toLocaleString()}건</span>
      </div>
      <div class="stat-row" style="border-top:1px solid var(--border);margin-top:6px;padding-top:6px">
        <span style="color:var(--muted)">최신순 ${vs.toLocaleString()}건 분석${_short.visitor ? lowNote : ''}</span>
      </div>
      ${va ? `<div class="stat-row"><span style="padding-left:8px">광고&#183;협찬 제거</span><span style="color:#f06060">−${va}건</span></div>` : ''}
      ${vd ? `<div class="stat-row"><span style="padding-left:8px">중복 복붙 제거</span><span style="color:#f0c860">−${vd}건</span></div>` : ''}
      <div class="stat-row" style="margin-top:4px">
        <span style="padding-left:8px;color:var(--text);font-weight:500">유효 리뷰</span>
        <span style="color:var(--accent);font-weight:600">${vv.toLocaleString()}건</span>
      </div>
    </div>`;

  // ── 블로그 리뷰 블록 ──
  const bt = p.blog_total || 0;
  const bs = p.blog_sampled || 0;
  const bv = p.blog_valid || 0;
  const ba = p.blog_ad_count || 0;
  const bd = p.blog_dup_count || 0;

  const blogBlock = `
    <div class="stat-block" style="margin-bottom:8px">
      <div class="review-type-badge badge-blog">블로그 리뷰</div>
      <div class="stat-row">
        <span>전체 리뷰 수 (네이버 집계)</span>
        <span style="color:var(--text);font-weight:500">${bt.toLocaleString()}건</span>
      </div>
      ${bs > 0 ? `
      <div class="stat-row" style="border-top:1px solid var(--border);margin-top:6px;padding-top:6px">
        <span style="color:var(--muted)">최신순 ${bs.toLocaleString()}건 분석${_short.blog ? lowNote : ''}</span>
      </div>
      ${ba ? `<div class="stat-row"><span style="padding-left:8px">광고&#183;협찬 제거</span><span style="color:#f06060">−${ba}건</span></div>` : ''}
      ${bd ? `<div class="stat-row"><span style="padding-left:8px">중복 복붙 제거</span><span style="color:#f0c860">−${bd}건</span></div>` : ''}
      <div class="stat-row" style="margin-top:4px">
        <span style="padding-left:8px;color:var(--text);font-weight:500">유효 리뷰</span>
        <span style="color:#60a0f0;font-weight:600">${bv.toLocaleString()}건</span>
      </div>` : `
      <div class="stat-row" style="margin-top:6px">
        <span style="color:var(--dim);font-size:11px">블로그 리뷰 분석 미수행 (재크롤링 필요)</span>
      </div>`}
    </div>`;

  // ── 긍정률 블록 ──
  const pr = p.positive_rate ?? null;
  const sentimentBlock = pr != null ? `
    <div class="stat-block">
      <div class="stat-row">
        <span style="color:var(--text);font-weight:500">긍정률</span>
        <span style="color:${rateColor(pr)};font-weight:700;font-size:15px">${pr}%</span>
      </div>
      <div class="stat-bar" style="margin-top:8px;height:6px">
        <div class="stat-bar-fill" style="width:${pr}%;background:${rateColor(pr)}"></div>
      </div>
      ${p.sentiment_total > 0 ? `
      <div class="stat-row" style="margin-top:8px;font-size:11px">
        <span style="color:var(--accent)">긍정 ${p.sentiment_positive}건</span>
        <span style="color:var(--muted)">중립 ${p.sentiment_neutral}건</span>
        <span style="color:#f06060">부정 ${p.sentiment_negative}건</span>
      </div>` : ''}
    </div>` : '';

  const naverUrl = `https://map.naver.com/p/entry/place/${p.id}`;
  const naverMapLink = (() => {
    const ua = navigator.userAgent;
    const name = encodeURIComponent(p.name);
    if (/Android/i.test(ua)) {
      return `intent://place?id=${p.id}&name=${name}#Intent;scheme=nmap;action=android.intent.action.VIEW;category=android.intent.category.BROWSABLE;package=com.nhn.android.nmap;end`;
    }
    if (/iPhone|iPad|iPod/i.test(ua)) {
      return `nmap://place?id=${p.id}&name=${name}&appname=matzip`;
    }
    return naverUrl;
  })();
  const _GEN = new Set(['음식점','식당','레스토랑','먹거리','푸드코트']);
  const cat = (p.category||'').split(',').map(c=>c.trim()).find(c=>c&&!_GEN.has(c))
              || (p.category||'').split(',')[0] || '';

  const awardsLine = (p.awards && p.awards.length)
    ? `<div style="margin-bottom:8px;display:flex;gap:4px;flex-wrap:wrap">${awardBadge(p.awards)}</div>` : '';

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-name">${p.name}</div>
    ${awardsLine}
    <div style="font-size:13px;color:var(--muted);margin-bottom:4px">${cat}</div>
    <div style="font-size:12px;color:var(--dim);margin-bottom:10px;line-height:1.5">${p.address || ''}</div>
    <a href="${naverMapLink}" target="_blank" rel="noopener"
       style="display:inline-flex;align-items:center;gap:5px;font-size:12px;
              color:var(--accent);text-decoration:none;margin-bottom:18px;
              border:1px solid rgba(3,199,90,.3);padding:4px 10px;border-radius:6px">
      네이버지도 바로가기 ↗
    </a>
    ${hoursBlock}
    <div class="section">
      <div class="section-title">리뷰 통계</div>
      ${visitorBlock}
      ${blogBlock}
      ${sentimentBlock}
    </div>
    ${buildAnalysisBlock(p)}
  `;

  if (window.innerWidth <= 768) closeSidebar();
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  activeId = null;
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelectorAll('.place-card').forEach(c => c.classList.remove('active'));
}

function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const btn = document.getElementById('listToggleBtn');
  const backdrop = document.getElementById('sidebarBackdrop');
  const isOpen = sidebar.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  btn.innerHTML = isOpen ? '✕ 닫기' : '☰ 목록 보기';
  backdrop.classList.toggle('active', isOpen);
}

function closeSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const btn = document.getElementById('listToggleBtn');
  const backdrop = document.getElementById('sidebarBackdrop');
  sidebar.classList.remove('open');
  btn.classList.remove('open');
  btn.innerHTML = '☰ 목록 보기';
  backdrop.classList.remove('active');
}

// ── 필터 & 정렬 ──
function applyFilters() {
  const q    = document.getElementById('searchInput').value.trim().toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  filteredPlaces = allPlaces.filter(p => {
    // 다중선택: 비어있으면 전체, 아니면 선택 분류 중 하나라도 포함(OR)
    const mf = activeCategories.size === 0
      || [...activeCategories].some(c => (p.category || '').includes(c));
    const mr = activeRegion === 'all' || regionLabel(p) === activeRegion;
    const aw = p.awards || [];
    const ma = activeAward === 'all'
      || (activeAward === 'any'    ? aw.length > 0
        : activeAward === '미쉐린' ? aw.some(a => a.startsWith('미쉐린'))
        : aw.includes(activeAward));
    const ms = !q
      || p.name.toLowerCase().includes(q)
      || (p.category || '').toLowerCase().includes(q)
      || (p.address || '').toLowerCase().includes(q)
      || regionLabel(p).toLowerCase().includes(q);
    return mf && mr && ma && ms;
  });

  filteredPlaces.sort((a, b) => {
    if (sort === 'reviews')  return b.filtered_reviews - a.filtered_reviews;
    if (sort === 'positive') return (b.positive_rate ?? -1) - (a.positive_rate ?? -1);
    if (sort === 'name')     return a.name.localeCompare(b.name, 'ko');
    return 0;
  });

  renderList();
  renderMarkers();
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('sortSelect').addEventListener('change', applyFilters);
document.getElementById('regionSelect').addEventListener('change', e => {
  activeRegion = e.target.value; applyFilters();
});
document.getElementById('awardSelect').addEventListener('change', e => {
  activeAward = e.target.value; applyFilters();
});

loadData();
</script>
</body>
</html>
